name: Ubuntu ZeroTier SSH (6h)

on:
  workflow_dispatch:

jobs:
  ubuntu-6h:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 giờ
    
    steps:
      - name: ⚡ Cài đặt ZeroTier
        run: |
          curl -s https://install.zerotier.com | sudo bash
          sudo zerotier-cli version

      - name: 🔗 Kết nối ZeroTier
        run: |
          # Network ID của bạn
          ZT_NET="b103a835d2b3a8b0"
          
          # Join network
          sudo zerotier-cli join $ZT_NET
          sleep 3
          
          # Hiển thị Node ID
          NODE_ID=$(sudo zerotier-cli info | cut -d' ' -f3)
          echo ""
          echo "╔═══════════════════════════════════════╗"
          echo "║   ZEROTIER CONNECTION INFO           ║"
          echo "╠═══════════════════════════════════════╣"
          echo "║ 📌 Network: $ZT_NET"
          echo "║ 🆔 Node ID: $NODE_ID"
          echo "║ ⚠️  VÀO my.zerotier.com ĐỂ AUTHORIZE ║"
          echo "╚═══════════════════════════════════════╝"
          echo ""
          
          # Đợi IP được gán
          echo "⏳ Đợi IP ZeroTier..."
          for i in {1..30}; do
            ZT_IP_ADDR=$(sudo zerotier-cli get $ZT_NET ip4 2>/dev/null)
            if [ -n "$ZT_IP_ADDR" ] && [ "$ZT_IP_ADDR" != "-" ]; then
              echo "✅ Đã nhận IP: $ZT_IP_ADDR"
              break
            fi
            echo "   Thử lần $i/30..."
            sleep 2
          done

      - name: 🔧 Cấu hình SSH
        run: |
          # Cài SSH server
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server neofetch htop vim tmux wget curl
          
          # Cấu hình SSH
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Set password cho user runner
          echo "runner:123456" | sudo chpasswd
          
          # Tạo SSH key
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          
          # Khởi động SSH
          sudo service ssh restart
          echo "✅ SSH đã sẵn sàng"

      - name: 📊 Thông tin kết nối
        run: |
          ZT_IP=$(sudo zerotier-cli get b103a835d2b3a8b0 ip4 2>/dev/null)
          
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║     UBUNTU ZEROTIER SSH - 6 GIỜ        ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ 📡 ZeroTier IP : $ZT_IP"
          echo "║ 👤 Username    : runner"
          echo "║ 🔑 Password    : 123456"
          echo "║ ⏰ Hết hạn     : $(date -d '+6 hours' '+%H:%M %d/%m/%Y')"
          echo "╠══════════════════════════════════════════╣"
          echo "║ 📱 SSH từ Termux:                       ║"
          echo "║   ssh runner@$ZT_IP                     ║"
          echo "║                                          ║"
          echo "║ 🔐 Hoặc dùng SSH Key:                   ║"
          echo "║   Copy key bên dưới vào Termux          ║"
          echo "║   ~/.ssh/id_ed25519_github              ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "============== SSH PRIVATE KEY =============="
          cat ~/.ssh/id_ed25519
          echo "============================================="
          echo ""

      - name: 🛠️ Cài công cụ hữu ích
        run: |
          echo "📦 Đang cài đặt công cụ..."
          sudo apt-get install -y -qq \
            git build-essential \
            python3 python3-pip \
            nodejs npm \
            docker.io 2>/dev/null || true
          
          echo ""
          echo "💻 THÔNG SỐ MÁY ẢO:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "CPU    : $(nproc) cores"
          echo "RAM    : $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Disk   : $(df -h / | awk 'NR==2 {print $4}') available"
          echo "Ubuntu : $(lsb_release -ds)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

      - name: 🔄 Keep Alive 6 Giờ
        run: |
          echo "🚀 BẮT ĐẦU PHIÊN 6 GIỜ"
          echo "⏰ Kết thúc: $(date -d '+6 hours' '+%H:%M:%S %d/%m/%Y')"
          echo ""
          
          # Đếm ngược 6 giờ
          START=$(date +%s)
          END=$((START + 21600))
          
          while [ $(date +%s) -lt $END ]; do
            NOW=$(date +%s)
            LEFT=$((END - NOW))
            H=$((LEFT / 3600))
            M=$(((LEFT % 3600) / 60))
            S=$((LEFT % 60))
            
            # Check ZeroTier
            ZT_OK=$(sudo zerotier-cli listnetworks 2>/dev/null | grep -c "OK")
            
            printf "\r⏱️  Còn: %02dh %02dm %02ds | ZT: %s | $(date '+%H:%M:%S')" \
              $H $M $S "$([ $ZT_OK -gt 0 ] && echo '✅' || echo '❌')"
            
            sleep 10
          done
          
          echo ""
          echo "⏰ HẾT 6 GIỜ! CHẠY LẠI WORKFLOW ĐỂ TIẾP TỤC"
